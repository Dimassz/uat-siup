<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – SIM E-Learning</title>
    <meta name="description" content="Login ke portal SIM E-Learning menggunakan NIM dan password." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        /* Decorative blobs */
        body::before {
            content: '';
            position: absolute;
            top: -100px; left: -100px;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: drift 10s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -120px; right: -80px;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            animation: drift 14s ease-in-out infinite reverse;
        }
        @keyframes drift {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(20px); }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 2.5rem 2.5rem 2rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            animation: slideUp 0.5s ease both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Brand header */
        .brand {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-bottom: 0.8rem;
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        .brand-icon svg { width: 32px; height: 32px; fill: none; stroke: #fff; stroke-width: 2; }
        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a202c;
            letter-spacing: -0.3px;
        }
        .brand p {
            font-size: 0.9rem;
            color: #718096;
            margin-top: 0.2rem;
        }

        /* Error box */
        .error-box {
            display: none;
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .error-box.hidden { display: none; }
        .error-box svg { flex-shrink: 0; width: 18px; height: 18px; stroke: #c53030; fill: none; stroke-width: 2; }

        /* Form */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.45rem;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px; height: 18px;
            stroke: #a0aec0;
            fill: none;
            stroke-width: 2;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            padding: 0.7rem 0.9rem 0.7rem 2.6rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #1a202c;
            background: #f7fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .input-wrap input:focus {
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .input-wrap input::placeholder { color: #a0aec0; }

        /* Toggle password */
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }
        .toggle-pw svg {
            position: static;
            transform: none;
            width: 18px; height: 18px;
            stroke: #a0aec0;
            fill: none;
            stroke-width: 2;
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
            box-shadow: 0 6px 20px rgba(102,126,234,0.35);
        }
        .btn-login:hover  { opacity: 0.9; }
        .btn-login:active { transform: scale(0.98); }

        .footer-note {
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.82rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Brand -->
            <div class="brand">
                <div class="brand-icon">
                    <!-- Graduation cap icon -->
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>SIM E-Learning</h1>
                <p>Masuk ke portal akademik</p>
            </div>

            <!-- Error message -->
            <div class="error-box hidden" id="errorBox">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText"></span>
            </div>

            <!-- Login form -->
            <form id="loginForm" action="/login" method="POST" novalidate>
                <div class="form-group">
                    <label for="nim">NIM</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input
                            type="text"
                            id="nim"
                            name="nim"
                            placeholder="Masukkan NIM Anda"
                            autocomplete="username"
                            required
                        />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Masukkan password"
                            autocomplete="current-password"
                            required
                        />
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Tampilkan password">
                            <svg id="eyeIcon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">Masuk</button>
            </form>

            <p class="footer-note">Sistem Informasi Manajemen &mdash; Universitas Pertamina</p>
        </div>
    </div>

    <script>
        // Show error from query string
        const params = new URLSearchParams(window.location.search);
        const err = params.get('error');
        if (err) {
            const box = document.getElementById('errorBox');
            document.getElementById('errorText').textContent = err;
            box.classList.remove('hidden');
        }

        // Toggle password visibility
        const togglePw = document.getElementById('togglePw');
        const pwInput  = document.getElementById('password');
        togglePw.addEventListener('click', () => {
            const isHidden = pwInput.type === 'password';
            pwInput.type = isHidden ? 'text' : 'password';
        });

        // Client-side basic validation (prevent empty submit)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const nim = document.getElementById('nim').value.trim();
            const pw  = document.getElementById('password').value.trim();
            if (!nim || !pw) {
                e.preventDefault();
                const box = document.getElementById('errorBox');
                document.getElementById('errorText').textContent = 'NIM dan password tidak boleh kosong.';
                box.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
