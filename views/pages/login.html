<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome back – SUPER</title>
    <meta name="description" content="Masuk ke portal SUPER (Sistem Pembelajaran Universitas Pertamina) menggunakan Username dan password." />
    <!-- Modern Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background-color: #ffffff;
            display: flex;
            overflow-x: hidden;
            color: #1e293b;
        }

        /* Two Column Container */
        .login-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Left Side: Form Column */
        .form-column {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem 4rem;
            position: relative;
            background-color: #ffffff;
        }

        /* Logo Brand Style */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .logo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            width: 28px;
            height: 28px;
        }

        .logo-box {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            background-color: #5B21B6;
        }

        .logo-box.rotated {
            border-radius: 4px;
            background-color: #06B6D4;
            transform: scale(0.9);
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #0f172a;
        }

        /* Center Content Area */
        .center-content {
            max-width: 400px;
            width: 100%;
            margin: auto 0;
        }

        .welcome-title {
            font-size: 2.25rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .welcome-subtitle {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        /* Error Alert Box */
        .alert-error {
            display: none;
            align-items: center;
            gap: 0.75rem;
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: #b91c1c;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.88rem;
            font-weight: 500;
            animation: shake 0.4s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .alert-error i {
            font-size: 1.1rem;
            color: #ef4444;
        }

        /* Input styling */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            color: #0f172a;
            background-color: #ffffff;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #5B21B6;
            box-shadow: 0 0 0 3px rgba(91, 33, 182, 0.12);
        }

        .input-wrapper input::placeholder {
            color: #94a3b8;
        }

        /* Eye Icon for Password toggle */
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .toggle-password:hover {
            color: #5B21B6;
        }

        /* Extra Actions: Remember & Forgot */
        .form-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.5rem 0;
            font-size: 0.88rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #475569;
            user-select: none;
        }

        .remember-me input {
            accent-color: #5B21B6;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-link {
            color: #5B21B6;
            font-weight: 600;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .forgot-link:hover {
            opacity: 0.8;
        }

        /* Buttons Style */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 0.85rem;
            background-color: #5B21B6;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.75rem;
            text-align: center;
        }

        .btn-submit:hover {
            background-color: #4c1d95;
            box-shadow: 0 4px 12px rgba(91, 33, 182, 0.25);
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.8rem;
            background-color: #ffffff;
            color: #334155;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2rem;
        }

        .btn-google:hover {
            background-color: #f8fafc;
            border-color: #94a3b8;
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        /* Signup bottom text */
        .signup-footer {
            text-align: center;
            font-size: 0.88rem;
            color: #64748b;
        }

        .signup-link {
            color: #5B21B6;
            font-weight: 600;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .signup-link:hover {
            opacity: 0.8;
        }

        /* Footer copyrights */
        .copyright-footer {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 2rem;
        }

        /* Right Side: Image/Banner Column */
        .banner-column {
            width: 50%;
            background-color: #06B6D4;
            background: linear-gradient(135deg, #06B6D4 0%, #5B21B6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
        }

        .banner-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .banner-wrapper img {
            width: 100%;
            height: auto;
            max-height: 520px;
            object-fit: contain;
            border-radius: 16px;
            /* subtle premium floating drop shadow for mockup integration */
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.15));
            animation: float-slow 6s ease-in-out infinite;
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive Layout Settings */
        @media (max-width: 992px) {
            .form-column {
                width: 60%;
                padding: 2.5rem 3rem;
            }
            .banner-column {
                width: 40%;
                padding: 2rem;
            }
        }

        @media (max-width: 768px) {
            .banner-column {
                display: none;
            }
            .form-column {
                width: 100%;
                padding: 2.5rem 2rem;
                justify-content: center;
            }
            .brand-header {
                position: absolute;
                top: 2rem;
                left: 2rem;
            }
            .copyright-footer {
                position: absolute;
                bottom: 2rem;
                left: 0;
                right: 0;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Left Column: Form -->
        <main class="form-column">
            <!-- Brand Logo Header -->
            <div class="brand-header">
                <div class="logo-grid">
                    <div class="logo-box"></div>
                    <div class="logo-box rotated"></div>
                    <div class="logo-box rotated"></div>
                    <div class="logo-box"></div>
                </div>
                <span class="brand-name">SUPER <span style="font-size: 0.72rem; font-weight: normal; opacity: 0.8; display: block; margin-top: 4px;">Sistem Pembelajaran Universitas Pertamina</span></span>
            </div>

            <!-- Central Form -->
            <div class="center-content">
                <h1 class="welcome-title">Welcome back</h1>
                <p class="welcome-subtitle">Please enter your details</p>

                <!-- Error Toast/Alert Alert -->
                <div class="alert-error" id="errorBox">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="errorText">Username atau password salah. Silakan coba lagi.</span>
                </div>

                <!-- Form -->
                <form id="loginForm" action="/login" method="POST" novalidate>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                placeholder="Masukkan Username Anda" 
                                autocomplete="username" 
                                required 
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Masukkan password" 
                                autocomplete="current-password" 
                                required 
                            />
                            <button type="button" class="toggle-password" id="togglePwBtn" aria-label="Tampilkan password">
                                <i class="fa-solid fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" name="remember" />
                            <span>Remember for 30 days</span>
                        </label>
                        <a href="#" class="forgot-link" onclick="alert('Silakan hubungi Administrator atau Dosen Anda untuk menyetel ulang password.')">Forgot password</a>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
                    
                    <button type="button" class="btn-google" onclick="alert('Login Google sedang dinonaktifkan sementara.')">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_android_64dp.png" alt="Google Logo" />
                        <span>Sign in with Google</span>
                    </button>
                </form>

                <p class="signup-footer">
                    Don't have an account? <a href="#" class="signup-link" onclick="alert('Silakan daftarkan NIM Anda melalui Administrator Kampus.')">Sign up</a>
                </p>
            </div>

            <!-- Footer Copyright -->
            <footer class="copyright-footer">
                &copy; 2026 Universitas Pertamina. All rights reserved.
            </footer>
        </main>

        <!-- Right Column: Visual illustration -->
        <aside class="banner-column">
            <div class="banner-wrapper">
                <img src="/images/login_illustration.png" alt="Portal E-Learning SIM" />
            </div>
        </aside>
    </div>

    <script>
        // Handle error parameters in URL dynamically
        const params = new URLSearchParams(window.location.search);
        const err = params.get('error');
        if (err) {
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            errorText.textContent = err;
            errorBox.style.display = 'flex';
        }

        // Toggle Password Show/Hide
        const togglePwBtn = document.getElementById('togglePwBtn');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePwBtn.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            eyeIcon.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        });

        // Basic Client Form Validation
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            const usernameVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();
            
            if (!usernameVal || !passVal) {
                e.preventDefault();
                const errorBox = document.getElementById('errorBox');
                const errorText = document.getElementById('errorText');
                errorText.textContent = 'Username dan Password tidak boleh kosong.';
                errorBox.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
